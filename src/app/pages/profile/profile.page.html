<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="profile-header">
    <ion-icon name="person-circle" class="profile-icon"></ion-icon>
    <h2>{{ userEmail }}</h2>
    <p>{{ totalSurveys }} encuestas registradas</p>
  </div>

  <ion-list>
    <ion-list-header>
      <ion-label>Mi actividad</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-icon name="stats-chart-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Total de encuestas</h3>
        <p>{{ totalSurveys }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="game-controller-outline" slot="start" color="secondary"></ion-icon>
      <ion-label>
        <h3>Juegos distintos</h3>
        <p>{{ uniqueGames }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="location-outline" slot="start" color="danger"></ion-icon>
      <ion-label>
        <h3>Ubicaciones distintas</h3>
        <p>{{ uniqueLocations }}</p>
      </ion-label>
    </ion-item>

    <ion-list-header>
      <ion-label>Tablero</ion-label>
    </ion-list-header>

    <ion-item button (click)="openDashboard()" detail>
      <ion-icon name="bar-chart-outline" slot="start" color="tertiary"></ion-icon>
      <ion-label color="tertiary">Ver tablero de encuestas</ion-label>
    </ion-item>

    <ion-list-header>
      <ion-label>Cuenta</ion-label>
    </ion-list-header>

    <ion-item button (click)="onLogout()" detail>
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Cerrar sesión</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
