<ion-content class="auth-content" fullscreen>
  <div class="auth-container">

    <div class="auth-header">
      <ion-icon name="person-add" class="auth-icon"></ion-icon>
      <h2>Crear Cuenta</h2>
      <p>Game Survey Campus</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <ion-list lines="none" class="auth-form">

        <ion-item class="auth-item">
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-input
            type="email"
            placeholder="Correo electrónico"
            [(ngModel)]="email"
            name="email"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="auth-item">
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Contraseña (mínimo 6 caracteres)"
            [(ngModel)]="password"
            name="password"
            required>
          </ion-input>
          <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" color="medium"></ion-icon>
          </ion-button>
        </ion-item>

        <ion-item class="auth-item">
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Confirmar contraseña"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required>
          </ion-input>
        </ion-item>

      </ion-list>

      <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

      <ion-button
        expand="block"
        type="submit"
        color="primary"
        shape="round"
        size="large"
        [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Registrarme</span>
      </ion-button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>

  </div>
</ion-content>
